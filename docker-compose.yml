services:
  backend:
    build:
      context: ./apps/backend
    container_name: ai-viz-backend
    ports:
      - "3001:3001"
    volumes:
      - ${HOST_HOME:-~}:/data/host-home:ro
    environment:
      - PORT=3001
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
    container_name: ai-viz-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
